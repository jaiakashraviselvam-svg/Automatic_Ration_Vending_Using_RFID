<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ration Portal - Login</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="page-center">
    <div class="login-box">
        <div class="login-header">
            <div class="login-logo">🌾</div>
            <div class="login-title">Ration Portal</div>
            <div class="login-subtitle">Automatic Vending System — RFID Login</div>
        </div>

        <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>
        <div th:if="${logoutMessage}" class="alert alert-success" th:text="${logoutMessage}"></div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label class="form-label" for="rfidCard"><span>📟</span> RFID Card Number</label>
                <input type="text" id="rfidCard" name="rfidCard" class="form-control"
                       placeholder="e.g. RFID001" required autofocus>
            </div>
            <div class="form-group">
                <label class="form-label" for="password"><span>🔒</span> Password</label>
                <input type="password" id="password" name="password" class="form-control"
                       placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn-primary">Login to Portal →</button>
        </form>

        <div class="rfid-hint">
            <strong>📋 Demo Credentials</strong>
            RFID001 / akash123 &nbsp;|&nbsp; RFID002 / priya123 &nbsp;|&nbsp; RFID003 / rahul123<br>
            RFID004 / sneha123 &nbsp;|&nbsp; RFID005 / vikram123
        </div>
    </div>
</div>
</body>
</html>
